name: reusable java sonar

on:
  workflow_call:
    inputs:
      head_sha:
        required: true
        type: string
      head_branch:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      workflow_run_id:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  scan:
    name: Java Sonar Scanner
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code Securely
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ inputs.head_sha }}
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download PR Artifacts
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          # Extracts both pr_info/ and target/ folders
          path: ${{ inputs.working_directory }}/
          run-id: ${{ inputs.workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Read the PR info written by the primary test runner
      - name: Parse Uploaded PR info
        id: pr_info
        # scope shell commands to pr_info folder
        working-directory: ${{ inputs.working_directory }}/pr_info/
        run: |
          PR_NUM=$(cat pr_number.txt)
          PR_BASE=$(cat pr_base.txt)

          if [ "$PR_NUM" != "false" ] && [ -n "$PR_NUM" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            echo "pr_base=$PR_BASE" >> $GITHUB_OUTPUT
            echo "Read context successfully: PR #$PR_NUM merging into $PR_BASE"
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "Read context successfully: No active PR context found."
          fi
      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run Sonar Analysis (PR Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'true' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
           mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
            -Dsonar.pullrequest.key=${{ steps.pr_info.outputs.pr_number }} \
            -Dsonar.pullrequest.base=${{ steps.pr_info.outputs.pr_base }} \
            -Dsonar.pullrequest.branch=${{ inputs.head_branch }}
      - name: Run Sonar Analysis (Branch Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'false' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
            -Dsonar.branch.name=${{ inputs.head_branch }}
