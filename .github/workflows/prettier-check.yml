name: "Run Prettier check"
on:
  pull_request:
    paths:
      - "authentication/**/*.java"
      - "backend-tests/**/*.java"
      - "background-services/**/*.java"
      - "data-generation/**/*.js"
      - "scrapers/**/*.java"
  workflow_dispatch:
jobs:
  run-prettier-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.10
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - run: npm ci
      - run: npm run format:check
