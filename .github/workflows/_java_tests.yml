name: reusable JUnit & JaCoCo test runner

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

jobs:
  java-tests:
    name: Maven JUnit tests and JaCoCo test report
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # Shallow clones should be disabled for a better relevancy of analysis
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          # new cache feature directly available in java-setup action
          cache: 'maven'

      # Save PR info inside the target directory for _java_sonar.yml to use
      - name: Save PR info
        working-directory: ${{ inputs.working_directory }}
        run: |
          mkdir -p target
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.event.pull_request.number }}" > target/pr_number.txt
            echo "${{ github.event.pull_request.base.ref }}" > target/pr_base.txt
            echo "PR_NUMBER: ${{ github.event.pull_request.number }}"
          else
            echo "false" > target/pr_number.txt
            echo "false" > target/pr_base.txt
            echo "Not a pull_request. Event: ${{ github.event_name }}"
          fi
      - name: Execute Tests and Generate Reports
        working-directory: ${{ inputs.working_directory }}
        run: mvn -B clean verify

      - name: Upload Target Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.working_directory }}/target/
          retention-days: 1
