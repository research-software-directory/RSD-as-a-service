name: backend tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "authentication/**"
      - "backend-postgrest/**"
      - "codemeta/**"
      - "database/**"
      - "backend-tests/**"
  pull_request:
    paths:
      - "authentication/**"
      - "backend-postgrest/**"
      - "codemeta/**"
      - "database/**"
      - "backend-tests/**"

jobs:
  api-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: "backend tests with docker compose"
        working-directory: backend-tests
        run: |
          docker compose up \
            --exit-code-from postgrest-tests
