name: scrapers tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scrapers/**"
  pull_request:
    paths:
      - "scrapers/**"

jobs:
  scrapers-tests:
    name: scrapers tests
    uses: ./.github/workflows/_java_tests.yml
    with:
      working_directory: "scrapers"
      artifact_name: "scrapers-target-dir"
