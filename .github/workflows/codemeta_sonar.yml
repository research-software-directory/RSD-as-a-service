name: codemeta sonar

on:
  workflow_run:
    workflows: ["codemeta tests"]
    types:
      - completed

jobs:
  codemeta-sonar:
    name: codemeta sonar
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code Securely
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download Metadata Artifact
        uses: actions/download-artifact@v7
        with:
          name: codemeta-pr-metadata
          path: codemeta/pr_info/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Uploaded PR info
        id: pr_info
        working-directory: codemeta/pr_info
        run: |
          PR_NUM=$(cat pr_number.txt)
          PR_BASE=$(cat pr_base.txt)

          if [ "$PR_NUM" != "false" ] && [ -n "$PR_NUM" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            echo "pr_base=$PR_BASE" >> $GITHUB_OUTPUT
            echo "Read context successfully: PR #$PR_NUM merging into $PR_BASE"
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "Read context successfully: No active PR context found."
          fi

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Scan codemeta (PR Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: codemeta
          args: >
            -Dsonar.pullrequest.key=${{ steps.pr_info.outputs.pr_number }}
            -Dsonar.pullrequest.base=${{ steps.pr_info.outputs.pr_base }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.head_branch }}

      - name: SonarCloud Scan codemeta (Branch Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'false' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: codemeta
          args: >
            -Dsonar.branch.name=${{ github.event.workflow_run.head_branch }}
