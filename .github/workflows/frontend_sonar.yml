# Run SonarCloud Safely using workflow_run
# The workflow_run event executes within the security context of your main branch,
# granting it access to ${{ secrets.SONAR_TOKEN }} even when processing contributions from a fork.

name: frontend sonar

on:
  workflow_run:
    # Must match the exact 'name' string of frontend_tests.yml
    workflows: ["frontend tests"]
    types:
      - completed

jobs:
  fe-sonar:
    name: "fe-sonar"
    # Ensure it only runs if the primary frontend testing pipeline succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      # 1. Checkout the code branch safely using isolated environment variables
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          # Use the safe string variable below
          ref: ${{ env.HEAD_BRANCH }}
          fetch-depth: 0
        env:
          # Isolates the code string inside a hard token context to block injection tricks
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

      # 2. AI suggested: dynamically discover the PR number using the Commit SHA (Works for Forks + Local PRs)
      - name: "get pull request number"
        id: pr_info
        run: |
          PR_NUMBER=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://github.com{{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" | jq '.[0].number')
          
          # If a PR is found, save it to the environment pipeline
          if [ "$PR_NUMBER" != "null" ] && [ -n "$PR_NUMBER" ]; then
            echo "PR_NUM=$PR_NUMBER" >> $GITHUB_ENV
            echo "Found Pull Request #$PR_NUMBER"
          else
            echo "No active Pull Request found for this commit."
          fi

      # 3. DOWNLOAD ARTIFACT CROSS-WORKFLOW (test-coverage)
      - name: "download coverage artifact"
        uses: actions/download-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          # Explicitly targets the parent workflow run to fetch its files
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Cache Sonar packages natively
      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 4. Run the Scan
      - name: SonarCloud Scan frontend
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          projectBaseDir: frontend
          # AI suggested: use verified PR number from our API query if it exists
          args: >
            -Dsonar.pullrequest.key=${{ env.PR_NUM }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.head_branch }}
            -Dsonar.pullrequest.base=${{ github.event.workflow_run.base_ref }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This secret is now safely accessible!
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
