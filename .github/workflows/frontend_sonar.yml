# Run SonarCloud Safely using workflow_run
# The workflow_run event executes within the security context of your main branch,
# granting it access to ${{ secrets.SONAR_TOKEN }} even when processing contributions from a fork.

name: frontend sonar

on:
  workflow_run:
    # Must match the exact 'name' string of frontend_tests.yml
    workflows: ["frontend tests"]
    types:
      - completed

jobs:
  # Run your frontend analysis using the shared outputs
  fe-sonar:
    name: "fe-sonar"
    # Ensure it only runs if the primary frontend testing pipeline succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      # 1. Checkout the code branch safely using isolated environment variables
      - name: Checkout target branch
        uses: actions/checkout@v6
        env:
          # Isolates the code string inside a hard token context to block injection tricks
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        with:
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          # Use the safe string variable below
          ref: ${{ env.HEAD_BRANCH }}
          fetch-depth: 0

      # 2. DOWNLOAD ARTIFACT CROSS-WORKFLOW (test-coverage)
      - name: "download coverage artifact"
        uses: actions/download-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          # Explicitly targets the parent workflow run to fetch its files
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Read the PR info written by the primary test runner
      - name: Parse Uploaded PR info
        id: pr_info
        working-directory: frontend
        run: |
          PR_NUM=$(cat coverage/pr_number.txt)
          PR_BASE=$(cat coverage/pr_base.txt)

          if [ "$PR_NUM" != "false" ] && [ -n "$PR_NUM" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            echo "pr_base=$PR_BASE" >> $GITHUB_OUTPUT
            echo "Read context successfully: PR #$PR_NUM merging into $PR_BASE"
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "Read context successfully: No active PR context found."
          fi

      # 4. Cache Sonar packages natively
      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 5a. Run the Scan in PR mode
      - name: SonarCloud Scan frontend (PR Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This secret is now safely accessible!
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          # AI suggested: use verified PR number from our API query if it exists
          args: >
            -Dsonar.pullrequest.key=${{ steps.pr_info.outputs.pr_number }}
            -Dsonar.pullrequest.base=${{ steps.pr_info.outputs.pr_base }}
            -Dsonar.pullrequest.branch=${{ github.event.workflow_run.head_branch }}

      # 5b. Fallback Scan for Direct Production/Main Branch Merges
      - name: SonarCloud Scan frontend (Branch Mode)
        if: ${{ steps.pr_info.outputs.is_pr == 'false' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.branch.name=${{ github.event.workflow_run.head_branch }}

